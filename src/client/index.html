<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid ER Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="toolbar">
    <button id="btn-back" class="toolbar-back" title="Back to file picker">&larr; File</button>
    <span class="toolbar-title">ER Diagram Viewer</span>
    <div class="toolbar-buttons">
      <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
      <button id="btn-redo" title="Redo (Ctrl+Y)" disabled>↪ Redo</button>
      <button id="btn-zoom-in" title="Zoom In (+)">+</button>
      <button id="btn-zoom-out" title="Zoom Out (-)">−</button>
      <button id="btn-fit" title="Fit View (F)">Fit</button>
      <button id="btn-auto-layout" title="Auto Layout (L)">Auto Layout</button>
      <button id="btn-compact" title="Compact Mode (C)">Compact</button>
      <span class="toolbar-separator"></span>
      <button id="btn-font-down" title="Font Size Down">A-</button>
      <span id="font-size-label" class="font-size-label">100%</span>
      <button id="btn-font-up" title="Font Size Up">A+</button>
      <button id="btn-export-svg" title="SVG保存">SVG</button>
      <button id="btn-export-png" title="PNG保存">PNG</button>
      <button id="btn-clipboard" title="クリップボードにコピー">Copy</button>
    </div>
    <div class="toolbar-shortcuts">
      <kbd>Ctrl+Z</kbd> Undo
      <kbd>Ctrl+Y</kbd> Redo
      <kbd>Scroll</kbd> Zoom
      <kbd>Ctrl+Drag</kbd> Pan
      <kbd>F</kbd> Fit
      <kbd>L</kbd> Auto Layout
      <kbd>C</kbd> Compact
      <kbd>Ctrl+0</kbd> Reset
    </div>
  </div>
  <div id="error-bar" style="display: none;"></div>
  <svg id="er-svg" xmlns="http://www.w3.org/2000/svg">
    <g id="viewport"></g>
  </svg>
  <script type="module" src="main.js"></script>
</body>
</html>
